name: scan

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours (odd minute to avoid the top-of-hour rush)
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        default: "all"
        type: choice
        options: [all, prices, flyertalk, feeds, fueldump]

concurrency:
  group: scan
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scanner --module "${{ github.event.inputs.module || 'all' }}"

      - name: Commit state back
        if: always()
        run: |
          git config user.name "flight-watcher bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
            exit 0
          fi
          git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M')"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase && continue
          done
          git push
